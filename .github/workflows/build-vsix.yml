name: Build VSIX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean node_modules and cache
        run: rm -rf node_modules ui/node_modules

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup, install, and build
        run: pnpm run setup

      - name: Package VSIX
        run: pnpm exec vsce package --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: wts-report-vsix
          path: wts-report-*.vsix
          retention-days: 30

      - name: Display artifact info
        run: ls -lh wts-report-*.vsix
