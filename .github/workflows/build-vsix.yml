name: Build VSIX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean node_modules and cache
        run: rm -rf node_modules ui/node_modules

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup, install, and build
        run: pnpm run setup

      - name: Package VSIX
        run: pnpm exec vsce package --allow-missing-repository

      - name: Extract version from package.json
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: wts-report-*.vsix
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wts-report-vsix
          path: wts-report-*.vsix
          retention-days: 30

      - name: Display artifact info
        run: ls -lh wts-report-*.vsix
