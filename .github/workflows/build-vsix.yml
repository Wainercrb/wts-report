name: Build VSIX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install UI dependencies
        run: cd ui && pnpm install && cd ..

      - name: Build UI
        run: cd ui && pnpm run build && cd ..

      - name: Compile extension
        run: pnpm run compile

      - name: Package VSIX
        run: pnpm vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: wts-report-vsix
          path: wts-report-*.vsix
          retention-days: 30

      - name: Display artifact info
        run: ls -lh wts-report-*.vsix
