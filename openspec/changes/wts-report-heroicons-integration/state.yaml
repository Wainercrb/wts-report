integration_strategy:
  approach: phased_all_in_one
  rationale: "Only 5 components affected; icons are decorative; cleaner to replace all at once"
  phases:
    - phase: 1
      title: "Create Icon Utility"
      description: "Create IconMap.js wrapper for consistent sizing"
    - phase: 2
      title: "Replace Template Icons"
      description: "Update AutomaticTab.js and ManualTab.js"
    - phase: 3
      title: "Replace Organism Icons"
      description: "Update AddedItems.js, ResultSection.js, StoredItems.js"
    - phase: 4
      title: "Enhance DeleteIcon"
      description: "Replace ✕ with Heroicons XMarkIcon"
    - phase: 5
      title: "Remove Material Symbols CDN"
      description: "Clean up HTML and CSS"

risks:
  - risk: Icon sizing looks off
    severity: LOW
    mitigation: "Heroicons sizing is standardized; test in dev/prod"
  - risk: Missing icon equivalent
    severity: VERY_LOW
    mitigation: "All 10 icons already mapped"
  - risk: Accessibility regression
    severity: VERY_LOW
    mitigation: "Heroicons has better a11y than Material Symbols"

readiness: ready_for_propose

notes: |
